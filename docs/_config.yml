# Jekyll config for the WUM documentation site (GitHub Pages).
# Theme: just-the-docs — sidebar navigation + built-in search.

title: WUM — Windows Update Manager
description: >-
  A modern .NET 10 command-line tool for managing Windows Updates from the
  terminal — list, install, pause, schedule, diagnose, and more.
logo: "/assets/wum-logo.svg"
favicon_ico: "/favicon.ico"
image: "/assets/wum-social.png"

# Served at https://isubroto.github.io/wum/
url: "https://isubroto.github.io"
baseurl: "/wum"

remote_theme: just-the-docs/just-the-docs

# ── Theme behavior ──────────────────────────────────────────────────────────
color_scheme: dark
search_enabled: true
search:
  heading_level: 3
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/
  rel_url: true

# Show "Edit this page on GitHub" + repo links in the aux nav.
aux_links:
  "WUM on GitHub":
    - "https://github.com/isubroto/wum"
aux_links_new_tab: true

gh_edit_link: true
gh_edit_link_text: "Edit this page on GitHub"
gh_edit_repository: "https://github.com/isubroto/wum"
gh_edit_branch: "main"
gh_edit_source: docs
gh_edit_view_mode: "tree"

# Collapsible code, copy button, back-to-top.
enable_copy_code_button: true
back_to_top: true
back_to_top_text: "Back to top"

heading_anchors: true

# Silence Dart Sass deprecation noise from the just-the-docs gem's own .scss.
sass:
  quiet_deps: true
  silence_deprecations:
    - color-functions
    - global-builtin
    - import

# Callout boxes used across the docs as `{: .note }`, `{: .warning }`, etc.
callouts:
  note:
    title: Note
    color: blue
  tip:
    title: Tip
    color: green
  important:
    title: Important
    color: purple
  warning:
    title: Warning
    color: yellow
  danger:
    title: Danger
    color: red

footer_content: >-
  Copyright &copy; 2026 Subroto Saha. Distributed under the MIT License.

# ── Jekyll plugins (whitelisted on GitHub Pages) ────────────────────────────
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-sitemap

# Exclude build/dev files from the published site.
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
