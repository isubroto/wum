name: Release WPF App with MSI

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  project: ./src/WUM.CLI/WUM.CLI.csproj
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  GITHUB_OWNER: ${{ github.repository_owner }}
  GITHUB_REPO: ${{ github.event.repository.name }}

jobs:
  release:
    # Avoid loops if a bot-triggered push occurs
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: windows-latest
    name: Build and Release WPF App with MSI

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v4.5.0
        with:
          versionSpec: "6.x"

      - name: Determine Version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v4.5.0
        
      - name: Compute versions
        id: versions
        shell: pwsh
        run: |
          # ── Version model ────────────────────────────────────────────────
          # safe = <major>.<minor>.<patch>.<N>  (always numeric 4-part, valid
          # for the .csproj <Version>, MSI ProductVersion, and release tag).
          #
          #   base major.minor.patch   = GitVersion MajorMinorPatch (e.g. 0.0.1)
          #   bump (commits since tag) : breaking -> +major  => 1.0.0.N
          #                              feat     -> +minor  => 0.1.0.N
          #                              fix/other-> +patch  => 0.0.2.N
          #   N                        = GitVersion PreReleaseNumber — the '43'
          #                              in FullSemVer '0.0.1-43'. This is the
          #                              same counter shown in 'full', so safe's
          #                              4th part matches full's pre-release num
          #                              (NOT CommitsSinceVersionSource, which is
          #                              anchored to a different tag and gave 13).
          $full  = '${{ steps.gitversion.outputs.FullSemVer }}'
          $mmp   = '${{ steps.gitversion.outputs.MajorMinorPatch }}'
          $N     = '${{ steps.gitversion.outputs.PreReleaseNumber }}'

          # Fallbacks if PreReleaseNumber is empty (e.g. an exact stable tag).
          if ([string]::IsNullOrWhiteSpace($N)) { $N = '${{ steps.gitversion.outputs.CommitsSinceVersionSource }}' }
          if ([string]::IsNullOrWhiteSpace($N)) { $N = '0' }

          # ── Base = highest existing RELEASE version ──────────────────────
          # Bump from the latest shipped version so the result is cumulative
          # and monotonic (0.1.0 -> 0.1.1 -> 0.2.0 ...), NOT from GitVersion's
          # stuck baseline 0.0.1.
          #
          # IMPORTANT: pick the HIGHEST version, not `git describe` (which
          # returns the newest *reachable* tag and caused versions to go
          # backward). Tags may be 3-part (v0.1.0) or 4-part (v0.1.0.46) — we
          # read the first three numeric components and ignore the 4th.
          $baseMajor = 0; $baseMinor = 0; $basePatch = 0
          $best = $null
          foreach ($tag in (git tag 2>$null)) {
              if ($tag -match '^v?(\d+)\.(\d+)\.(\d+)') {
                  $v = [version]("{0}.{1}.{2}" -f $Matches[1], $Matches[2], $Matches[3])
                  if ($null -eq $best -or $v -gt $best) {
                      $best = $v
                      $baseMajor = [int]$Matches[1]
                      $baseMinor = [int]$Matches[2]
                      $basePatch = [int]$Matches[3]
                  }
              }
          }
          if ($null -eq $best) {
              # No release tags yet — fall back to GitVersion MajorMinorPatch.
              if ($mmp -match '^(\d+)\.(\d+)\.(\d+)$') {
                  $baseMajor = [int]$Matches[1]; $baseMinor = [int]$Matches[2]; $basePatch = [int]$Matches[3]
              } else { $basePatch = 1 }
          }
          Write-Host "Base (latest release) : $baseMajor.$baseMinor.$basePatch"

          # ── Commit range since last tag (for bump detection only) ────────
          $latestTag = git describe --tags --abbrev=0 2>$null
          if ($latestTag) {
              $commitMessages = git log "$latestTag..HEAD" --format="%s" 2>$null
          } else {
              $commitMessages = git log --format="%s" 2>$null
          }
          $commitCount = ($commitMessages | Measure-Object).Count
          Write-Host "Latest tag            : $latestTag"
          Write-Host "Commits since tag     : $commitCount"

          # ── Scan commits for highest bump type ───────────────────────────
          $hasBreaking = $false; $hasFeat = $false; $hasFix = $false
          foreach ($msg in $commitMessages) {
              if ([string]::IsNullOrWhiteSpace($msg)) { continue }
              $msg = $msg.Trim()
              if ($msg -match 'BREAKING[ _]CHANGE' -or $msg -match '^[a-z]+(\([^)]*\))?!:') {
                  $hasBreaking = $true
              } elseif ($msg -match '^feat(\([^)]*\))?:') {
                  $hasFeat = $true
              } elseif ($msg -match '^fix(\([^)]*\))?:') {
                  $hasFix = $true
              }
          }
          Write-Host "Detected -> Breaking=$hasBreaking Feat=$hasFeat Fix=$hasFix"

          # ── Apply bump on top of base ────────────────────────────────────
          $major = $baseMajor; $minor = $baseMinor; $patch = $basePatch
          if ($hasBreaking) {
              $major = $baseMajor + 1; $minor = 0; $patch = 0
              Write-Host "Bump: MAJOR"
          } elseif ($hasFeat) {
              $minor = $baseMinor + 1; $patch = 0
              Write-Host "Bump: MINOR"
          } elseif ($hasFix) {
              $patch = $basePatch + 1
              Write-Host "Bump: PATCH (fix)"
          } else {
              $patch = $basePatch + 1
              Write-Host "Bump: PATCH (other)"
          }

          $safe = "$major.$minor.$patch.$N"

          Write-Host "============================================"
          Write-Host "  FullSemVer : $full"
          Write-Host "  N (pre-rel): $N"
          Write-Host "  Safe       : $safe"
          Write-Host "============================================"

          Add-Content -Path $env:GITHUB_OUTPUT -Value "full=$full"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "safe=$safe"

      - name: Update .csproj Version
        shell: pwsh
        run: |
          $projFile = Get-Item $env:project
          Write-Host "Updating version in: $($projFile.FullName)"
          $version = '${{ steps.versions.outputs.safe }}'
          $versionTag = "<Version>$version</Version>"

          $content = Get-Content $projFile.FullName -Raw
          if ($content -notmatch '<Version>.*?</Version>') {
            $content = $content -replace '</PropertyGroup>', "$versionTag`n</PropertyGroup>"
          } else {
            $content = $content -replace '<Version>.*?</Version>', $versionTag
          }
          Set-Content $projFile.FullName $content -Encoding UTF8
          Get-Content $projFile.FullName | Select-String "<Version>"

      - name: Update docs metadata
        shell: pwsh
        run: .\scripts\Update-DocsMetadata.ps1

      - name: Restore Dependencies
        shell: pwsh
        run: dotnet restore ${{ env.project }} -r win-x64

      - name: Build WPF App
        shell: pwsh
        run: dotnet build ${{ env.project }} -c Release --no-restore

      - name: Publish WPF App
        shell: pwsh
        run: dotnet publish ${{ env.project }} -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true --no-build

      - name: Install WiX Toolset
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri https://github.com/wixtoolset/wix/releases/download/v7.0.0/wix-cli-x64.msi -OutFile wix7.msi
          Start-Process wix7.msi -ArgumentList "/quiet" -Wait
          & "C:\Program Files\WiX Toolset v7.0\bin\wix.exe" eula accept wix7
          & "C:\Program Files\WiX Toolset v7.0\bin\wix.exe" extension add WixToolset.Util.wixext/7.0.0
          Remove-Item wix7.msi

      - name: Generate Files.wxs excluding 'publish' folder
        shell: pwsh
        run: .\scripts\Generate-WixFiles.ps1 -SourceDir "src/WUM.CLI/bin/Release/net10.0-windows/win-x64" -OutputPath "Installer\Files.wxs"

      - name: Show Files.wxs
        shell: pwsh
        run: Get-Content -Path "Installer\Files.wxs"

      - name: Show Product.wxs
        shell: pwsh
        run: Get-Content -Path "Installer\Product.wxs"

      - name: Build MSI Installer
        working-directory: Installer
        shell: pwsh
        run: |
          $safeVersion = '${{ steps.versions.outputs.safe }}'   # for file names/tags

          "SAFE_VERSION=$safeVersion" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          & "C:\Program Files\WiX Toolset v7.0\bin\wix.exe" build `
            -acceptEula wix7 `
            Product.wxs Files.wxs `
            -arch x64 `
            -ext WixToolset.Util.wixext `
            -define ProductVersion=$safeVersion `
            -define SourceDir="..\src/WUM.CLI/bin/Release/net10.0-windows/win-x64" `
            -out "../publish/wum-$safeVersion.msi"

      - name: Upload Release Artifacts
        uses: softprops/action-gh-release@v2
        with:
          name: "WUM v${{ steps.versions.outputs.safe }}"
          tag_name: v${{ steps.versions.outputs.safe }}
          body: |
            ## 🧹 wum v${{ steps.versions.outputs.safe }}

            ### 📦 What's Included
            - Portable Executable (single-file)
            - MSI Installer

            ### 🚀 Installation
            - Download `wum-${{ steps.versions.outputs.safe }}.msi` and run it
            - Or use the portable `.exe`

            ### 📝 Notes
            Improvements and bug fixes. Report issues here: https://github.com/${{ github.repository }}/issues
          files: |
            src/WUM.CLI/bin/Release/net10.0-windows/win-x64/publish/*.exe
            publish/wum-${{ steps.versions.outputs.safe }}.msi
          draft: false
          prerelease: false
          generate_release_notes: true

      - name: Commit & Push version metadata changes (if any)
        shell: pwsh
        run: |
          git config user.name "Subroto Saha"
          git config user.email "isubrotosaha@gmail.com"
          git add $env:project docs/_data/project.yml
          if (git diff --cached --quiet) {
            Write-Host "🟢 No changes to commit. Version metadata already up to date."
          } else {
            $safeVersion = '${{ steps.versions.outputs.safe }}'
            git commit -m "🔖 Bump version to $safeVersion"
            git push origin HEAD
            Write-Host "✅ Committed and pushed updated version metadata: $safeVersion"
          }

      # -----------------------------
      # WinGet: Create manifests, validate, submit
      # Only for stable releases (no '-' in version)
      # -----------------------------
      - name: Create WinGet Manifests
        if: true
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $version = '${{ steps.versions.outputs.safe }}'
          $repo = "${{ github.repository }}"
          $repoUrl = "https://github.com/$repo"

          $msiName = "wum-$version.msi"
          $msiPath = "publish\$msiName"
          if (-not (Test-Path $msiPath)) { throw "MSI not found at $msiPath" }

          $msiUrl = "$repoUrl/releases/download/v$version/$msiName"
          $hash = (Get-FileHash -Path $msiPath -Algorithm SHA256).Hash

          # Read MSI properties (ProductCode)
          function Get-MsiProperty {
            param([Parameter(Mandatory)][string]$Path,
                  [Parameter(Mandatory)][string]$Property)
            $installer = New-Object -ComObject WindowsInstaller.Installer
            $database  = $installer.GetType().InvokeMember("OpenDatabase","InvokeMethod",$null,$installer,@($Path,0))
            $view = $database.OpenView("SELECT ``Value`` FROM ``Property`` WHERE ``Property`` = '$Property'")
            $view.Execute()
            $record = $view.Fetch()
            $value = if ($record) { $record.StringData(1).Trim() } else { $null }
            $view.Close()
            $database = $null
            $installer = $null
            return $value
          }

          $productCode = Get-MsiProperty -Path $msiPath -Property "ProductCode"
          if (-not $productCode) { throw "Failed to read ProductCode from $msiPath" }

          Write-Host "Raw ProductCode: '$productCode'"

          # Try to extract GUID pattern first
          $guidPattern = '\{[A-Fa-f0-9]{8}-[A-Fa-f0-9]{4}-[A-Fa-f0-9]{4}-[A-Fa-f0-9]{4}-[A-Fa-f0-9]{12}\}'
          $match = [regex]::Match($productCode, $guidPattern)

          if ($match.Success) {
              $cleanProductCode = $match.Value
              Write-Host "Extracted GUID: '$cleanProductCode'"
          } else {
              # Fallback: just trim and remove non-printable characters
              $cleanProductCode = ($productCode -replace '[^\x21-\x7E]', '').Trim()
              Write-Host "Fallback cleaned: '$cleanProductCode'"
          }

          Write-Host "Final ProductCode: '$cleanProductCode'"
          # Create output directory
          New-Item -ItemType Directory -Force -Path "winget" | Out-Null

          # ------------------------------
          # Version Manifest
          # ------------------------------
          $versionManifest = @"
          # yaml-language-server: `$schema=https://aka.ms/winget-manifest.version.1.12.0.schema.json
          # Created with wum Release Workflow

          PackageIdentifier: SubrotoSaha.wum
          PackageVersion: $version
          DefaultLocale: en-US
          ManifestType: version
          ManifestVersion: 1.12.0
          "@
          $versionManifest = ($versionManifest -replace '(?m)^ {10}', '').Trim()

          # ------------------------------
          # Default Locale Manifest
          # ------------------------------
          $localeManifest = @"
          # yaml-language-server: `$schema=https://aka.ms/winget-manifest.defaultLocale.1.12.0.schema.json
          # Created with wum Release Workflow

          PackageIdentifier: SubrotoSaha.wum
          PackageVersion: $version
          PackageLocale: en-US
          Publisher: Subroto Saha
          PublisherUrl: $repoUrl
          PublisherSupportUrl: $repoUrl/issues
          Author: Subroto Saha
          PackageName: wum
          PackageUrl: $repoUrl
          License: MIT
          LicenseUrl: $repoUrl/blob/main/LICENSE
          Copyright: Copyright (c) $(Get-Date -Format "yyyy") Subroto Saha
          ShortDescription: A powerful Windows temporary files cleaner.
          Description: |-
            wum is a professional Windows utility that helps you clean temporary files, system cache, and free up disk space. 
            Features include safe cleaning algorithms, detailed scan reports, and scheduled cleaning options.
          Moniker: wum
          Tags:
            - cleaner
            - temp-files
            - disk-cleanup
            - system-utility
            - windows
            - maintenance
            - privacy
          ReleaseNotes: |
            This release includes improvements and bug fixes.
            For detailed changelog, visit: $repoUrl/releases/tag/v$version
          ReleaseNotesUrl: $repoUrl/releases/tag/v$version
          ManifestType: defaultLocale
          ManifestVersion: 1.12.0
          "@
          $localeManifest = ($localeManifest -replace '(?m)^ {10}', '').Trim()

          # ------------------------------
          # Installer Manifest
          # ------------------------------
          $installerManifest = @"
          # yaml-language-server: `$schema=https://aka.ms/winget-manifest.installer.1.12.0.schema.json
          # Created with wum Release Workflow

          PackageIdentifier: SubrotoSaha.wum
          PackageVersion: $version
          Platform:
            - Windows.Desktop
          MinimumOSVersion: 10.0.0.0
          InstallerType: wix
          InstallModes:
            - interactive
            - silent
            - silentWithProgress
          ExpectedReturnCodes:
            - InstallerReturnCode: 1602
              ReturnResponse: cancelledByUser
            - InstallerReturnCode: 1618
              ReturnResponse: installInProgress
            - InstallerReturnCode: 1638
              ReturnResponse: alreadyInstalled
            - InstallerReturnCode: 3010
              ReturnResponse: rebootRequiredToFinish
          UpgradeBehavior: install
          Installers:
            - Architecture: x64
              Scope: machine
              InstallerUrl: $msiUrl
              InstallerSha256: $hash
              ProductCode: '$cleanProductCode'
              ElevationRequirement: elevationRequired
              InstallerSwitches:
                Silent: /qn /norestart
                SilentWithProgress: /qb! /norestart
          ManifestType: installer
          ManifestVersion: 1.12.0
          "@
          $installerManifest = ($installerManifest -replace '(?m)^ {10}', '').Trim()

          Set-Content -Path "winget/SubrotoSaha.wum.yaml" -Value $versionManifest -Encoding utf8NoBOM
          Set-Content -Path "winget/SubrotoSaha.wum.locale.en-US.yaml" -Value $localeManifest -Encoding utf8NoBOM
          Set-Content -Path "winget/SubrotoSaha.wum.installer.yaml" -Value $installerManifest -Encoding utf8NoBOM

          Write-Host ""
          Write-Host "=== SubrotoSaha.wum.yaml ==="
          Get-Content "winget/SubrotoSaha.wum.yaml"

          Write-Host ""
          Write-Host "=== SubrotoSaha.wum.locale.en-US.yaml ==="
          Get-Content "winget/SubrotoSaha.wum.locale.en-US.yaml"

          Write-Host ""
          Write-Host "=== SubrotoSaha.wum.installer.yaml ==="
          Get-Content "winget/SubrotoSaha.wum.installer.yaml"
          Write-Host ""

          Write-Host "✅ WinGet manifests created"
          Write-Host "MSI URL:     $msiUrl"
          Write-Host "SHA256:      $hash"
          Write-Host "ProductCode: $cleanProductCode"

      - name: Upload WinGet Manifests as Artifacts
        if: true
        uses: actions/upload-artifact@v4
        with:
          name: winget-manifests-v${{ steps.versions.outputs.safe }}
          path: winget/

      - name: Download wingetcreate
        if: true
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/microsoft/winget-create/releases/latest/download/wingetcreate.exe" -OutFile wingetcreate.exe

      - name: Validate WinGet manifests
        if: true
        shell: pwsh
        run: |
          if (-not (Get-Command winget -ErrorAction SilentlyContinue)) {
           Write-Host "winget CLI not found on this runner; skipping validation."
           exit 0
           }
           winget --info

           $validateLog = Join-Path $env:RUNNER_TEMP "winget-validate.log"
           Remove-Item -LiteralPath $validateLog -Force -ErrorAction SilentlyContinue

           $escapedValidateLog = $validateLog.Replace('"', '""')
           & $env:ComSpec /d /s /c "winget validate --manifest winget > ""$escapedValidateLog"" 2>&1"
           $validateExitCode = $LASTEXITCODE

           $validateOutput = @()
           if (Test-Path -LiteralPath $validateLog) {
             $validateOutput = @(Get-Content -Path $validateLog)
           }

           if ($validateOutput.Count -gt 0) {
             $validateOutput | ForEach-Object { Write-Host $_ }
           }

           $captureFailed = (
             $validateOutput.Count -eq 0 -or
             (($validateOutput -join "`n") -match 'The system cannot execute the specified program|not recognized as an internal or external command')
           )

           if ($captureFailed) {
             Write-Warning "Could not capture winget validate output; running validation without redirection."
             winget validate --manifest winget
             $validateExitCode = $LASTEXITCODE

             $manifestValidationWarning = -1978335192 # 0x8A150028
             if ($validateExitCode -eq 0 -or $validateExitCode -eq $manifestValidationWarning) {
               if ($validateExitCode -eq $manifestValidationWarning) {
                 Write-Warning "WinGet manifest validation returned warning-only exit code 0x8A150028; continuing."
               }
               exit 0
             }

             Write-Error "winget validate failed with exit code $validateExitCode."
             exit $validateExitCode
           }

           $hasManifestError = Select-String -Path $validateLog -Pattern '^Manifest Error:' -Quiet
           $hasManifestWarning = Select-String -Path $validateLog -Pattern '^Manifest Warning:' -Quiet
           $hasWarningSummary = Select-String -Path $validateLog -Pattern 'Manifest validation succeeded with warnings?' -Quiet

           if ($hasManifestError) {
             Write-Error "WinGet manifest validation failed."
             if ($validateExitCode -ne 0) { exit $validateExitCode }
             exit 1
           }

           if ($validateExitCode -ne 0) {
             if ($hasManifestWarning -or $hasWarningSummary) {
               Write-Warning "WinGet manifest validation returned exit code $validateExitCode for warnings only; continuing."
               exit 0
             }

             Write-Error "winget validate failed with exit code $validateExitCode."
             exit $validateExitCode
           }

           exit 0

      - name: Submit to WinGet
        if: true
        env:
          WINGET_TOKEN: ${{ secrets.WINGET_TOKEN }}
        shell: pwsh
        run: .\wingetcreate.exe submit --prtitle "Add SubrotoSaha.wum v${{ steps.versions.outputs.safe }}" --token "$env:WINGET_TOKEN" winget
